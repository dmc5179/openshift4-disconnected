apiVersion: apps/v1
kind: Deployment
metadata:
  name: rhokp-server
  namespace: rhokp-server
  labels:
    app: rhokp-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: rhokp-app
  template:
    metadata:
      labels:
        app: rhokp-app
    spec:
      containers:
      - name: rhokp
        image: registry.redhat.io/offline-knowledge-portal/rhokp-rhel9:latest
        env:
        - name: ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: access-credentials
              key: ACCESS_KEY
        ports:
        - name: http
          containerPort: 8080
        - name: https
          containerPort: 8443
---
apiVersion: v1
kind: Secret
metadata:
  name: access-credentials
type: Opaque
data:
  # This is the key obtained from rhn.redhat.com, encoded in base64
  ACCESS_KEY: "base64 encoded key from rhn.redhat.com"
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: rhokp-app
  name: rhokp-server
  namespace: rhokp
spec:
  internalTrafficPolicy: Cluster
  ipFamilies:
  - IPv4
  ipFamilyPolicy: SingleStack
  ports:
  - port: 8443
    protocol: TCP
    targetPort: 8443
  selector:
    app: rhokp-app
  sessionAffinity: None
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  annotations:
    openshift.io/host.generated: "true"
  labels:
    app: rhokp-app
  name: rhokp-server
  namespace: rhokp
spec:
  port:
    targetPort: 8443
  to:
    kind: Service
    name: rhokp-server
    weight: 100
  wildcardPolicy: None
